apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: grafana-dashboards-kube
    files:
      - dashboards/cilium-bgp.json=../dashboards/cilium-bgp.json
      - dashboards/kubernetes-cluster-status.json=../dashboards/kubernetes-cluster-status.json
    options:
      labels:
        grafana_dashboard: "1"    # watched by grafana-sc-dashboard sidecar
      disableNameSuffixHash: true
